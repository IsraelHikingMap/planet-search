name: Search relevance check

on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Search API base to score against"
        required: true
        default: "https://mapeak.com"

jobs:
  relevance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Run relevance check
        env:
          ENDPOINT: ${{ inputs.endpoint }}
        run: |
          if ! printf '%s' "$ENDPOINT" | grep -Eq '^https?://[A-Za-z0-9._:/-]+$'; then
            echo "::error::endpoint must be a plain http(s) URL, got: $ENDPOINT"; exit 1
          fi
          mvn -q -Prelevance -Drelevance.endpoint="$ENDPOINT" test

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relevance-surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn
